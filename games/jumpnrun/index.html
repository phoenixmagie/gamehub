<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Jumper Level Editor + Import</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toolbar">
        <div class="tool active" data-type="S">S (Start)</div>
        <div class="tool" data-type="#"># (Block)</div>
        <div class="tool" data-type="-">- (Plattform)</div>
        <div class="tool" data-type="C">C (Coin)</div>
        <div class="tool" data-type="E">E (Gegner)</div>
        <div class="tool" data-type="X">X (Wende)</div>
        <div class="tool" data-type="P">P (Checkpoint)</div>
        <div class="tool" data-type="F">F (Flagge)</div>
        <div class="tool" data-type=" ">LÖSCHEN</div>
        <button id="import-btn" style="background: #3498db; color: white;">LEVEL LADEN</button>
        <button id="export-btn" style="background: #2ecc71; color: white;">CODE GENERIEREN</button>
    </div>

    <div id="editor-container">
        <div id="grid"></div>
    </div>

    <div id="modal" class="hidden">
        <div class="modal-content">
            <h3 id="modal-title">Level-Code</h3>
            <p id="modal-desc">Hier den Code einfügen oder kopieren:</p>
            <textarea id="io-text"></textarea>
            <div id="modal-actions">
                <button id="confirm-import-btn" class="hidden">IMPORTIEREN</button>
                <button onclick="closeModal()">SCHLIEẞEN</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Adventure</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="menu-container">
        <h1>LEVEL AUSWAHL</h1>
        <div id="level-grid"></div>
        
        <div id="editor-link-container" style="margin-top: 20px;">
            <a href="editor.html" class="ui-btn" style="text-decoration: none; background: #e74c3c; color: white; display: inline-block;">🛠 LEVEL EDITOR</a>
        </div>

        <hr style="width: 80%; margin: 30px 0;">
        <a href="../../index.html" class="hub-btn">ZURÜCK ZUM HUB</a>
    </div>

    <div id="game-screen" class="hidden">
        <div id="world-container">
            <div id="world"><div id="player"></div></div>
        </div>
        
        <div id="ui">
            <div class="ui-row">
                <div id="lives-container"></div>
                <div id="coin-info">🪙 <span id="coin-count">0</span></div>
            </div>
            <div class="ui-row">
                <button class="ui-btn" onclick="exitToMenu()">MENÜ</button>
                <span id="level-display">Level 1</span>
            </div>
        </div>

        <div id="controls">
            <div class="move-group">
                <button id="btn-left">◀</button>
                <button id="btn-right">▶</button>
            </div>
            <button id="btn-jump">JUMP</button>
        </div>
    </div>

    <div id="win-screen" class="hidden">
        <div class="win-content">
            <h1>GEWONNEN!</h1>
            <p>Du hast alle Welten gerettet.</p>
            <button class="ui-btn" onclick="location.reload()">ZUM START</button>
        </div>
    </div>

    <script type="module" src="game.js"></script>
</body>
</html>

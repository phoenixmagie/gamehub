<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cookie Clicker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="click-section">
            <h1 id="cookie-count">0 Cookies</h1>
            <p id="cps-display">0 pro Sekunde</p>
            
            <div id="cookie-container" onclick="clickCookie()">
                <div id="cookie-css">
                    <div class="chip c1"></div>
                    <div class="chip c2"></div>
                    <div class="chip c3"></div>
                    <div class="chip c4"></div>
                    <div class="chip c5"></div>
                    <div class="chip c6"></div>
                </div>
            </div>

            <a href="../../index.html" class="back-btn">← Zurück zum Hub</a>
        </div>

        <div class="shop-section">
            <h2>Shop</h2>
            <div id="shop-items">
                </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>

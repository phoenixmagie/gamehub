<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tetris Classic</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="stats">
            <div>Punkte: <span id="score">0</span></div>
            <a href="../../index.html" class="back-link">ZUM HUB</a>
        </div>
        
        <canvas id="tetris" width="240" height="400"></canvas>

        <div id="controls">
            <button class="btn" onclick="playerMove(-1)">◀</button>
            <button class="btn" onclick="playerRotate(1)">↻</button>
            <button class="btn" onclick="playerMove(1)">▶</button>
            <button class="btn" onclick="playerDrop()">▼</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>

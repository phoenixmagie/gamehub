<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tower Defense</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-ui">
        <div class="stats">
            💰 <span id="money">200</span> | ❤️ <span id="lives">20</span> | Welle: <span id="wave">1</span>
        </div>
        <div class="shop">
            <button class="tower-btn" onclick="selectTower('basic')">Turm (50€)</button>
            <button class="tower-btn" onclick="selectTower('sniper')">Sniper (100€)</button>
            <a href="../../index.html" class="exit-btn">Hub</a>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <script src="game.js"></script>
</body>
</html>

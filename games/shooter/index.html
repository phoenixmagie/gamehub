<!DOCTYPE html>
<html lang="de">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile FPS Three.js</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
            "imports": {

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird - Gamehub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <a href="https://phoenixmagiegames.vercel.app/index.html" class="back-link">← Hub</a>
        <div id="currentScore">0</div>

        <div class="canvas-wrapper">
            <canvas id="birdCanvas" width="320" height="480"></canvas>
            
            <div id="restartMenu">
                <h2>spiel vorbei!</h2>
                <button id="btnRestart">Restart</button>
            </div>
        </div>

        <div class="controls">
            <button id="btnJump">flatter!</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>

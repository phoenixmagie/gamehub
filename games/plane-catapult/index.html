<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Epic Plane Evolution</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-viewport">
        <div id="lvl-tag">LEVEL 1</div>
        
        <div id="world"></div>

        <div id="plane-container">
            <div id="plane" class="lvl-1">
                <div class="body"></div>
                <div class="cockpit"></div>
                <div class="wings"></div>
                <div class="engines"></div>
                <div class="tail"></div>
            </div>
        </div>

        <div id="hud">
            <div id="money-display">0 $</div>
            <div id="dist-display">0 m</div>
        </div>

        <div id="upgrade-menu" class="hidden">
            <h1 class="evo-title">EVOLVE!</h1>
            <p id="flight-info"></p>
            <div class="shop">
                <div class="item" onclick="buyUpgrade('plane')">
                    🚀 FLUGZEUG<br><span id="p-plane">200$</span>
                </div>
                <div class="item" onclick="buyUpgrade('power')">
                    ⚓ POWER<br><span id="p-power">150$</span>
                </div>
            </div>
            <button class="start-btn" onclick="resetFlight()">NÄCHSTER START</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
